name: Production Deployment Control Loop

on:
  push:
    branches:
      - main

jobs:
  continuous-deployment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository References
        uses: actions/checkout@v4

      - name: Initialize Runtime Python Workspace Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install System Engine Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Securely Execute Automated Remote Deployment Script
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          python deploy.py
